<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fluxperf® &middot; Visionneuse site</title>
    <link rel="icon" href="assets/favicon-fluxperf.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <header class="device-switcher">
      <div class="brand-block" aria-label="Informations projet">
        <a class="brand-logo-link" href="https://www.fluxperf.fr" target="_blank" rel="noopener noreferrer" aria-label="Ouvrir le site Fluxperf">
          <img class="brand-logo" src="assets/fluxperf-logo.svg" alt="Fluxperf" />
        </a>
        <p class="eyebrow" id="project-name">DÉMO SITE</p>
        <h1>Laissez-nous piloter votre visibilité au quotidien &middot; <a class="brand-learn-more" href="https://www.fluxperf.fr" target="_blank" rel="noopener noreferrer">En savoir plus</a></h1>
        <p><i>Fluxperf® &middot; Le pôle digital externalisé des TPE &middot; PME depuis 2014</i></p>
      </div>

      <a
        class="header-cta"
        href="https://calendly.com/loadigit/demo-site-web-rdv-decouverte-loadigit?month=2026-05"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="header-cta-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M8 2.5v3"></path>
            <path d="M16 2.5v3"></path>
            <rect x="3.75" y="4.5" width="16.5" height="16" rx="3"></rect>
            <path d="M7.5 9h9"></path>
            <path d="M8 13h.01"></path>
            <path d="M12 13h.01"></path>
            <path d="M16 13h.01"></path>
          </svg>
        </span>
        <span>Prenons 15min ensemble</span>
      </a>

      <nav class="switcher-actions" aria-label="Sélection du device">
        <button class="switcher-button is-active" type="button" data-view="all" aria-label="Afficher la vue globale" aria-pressed="true">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <rect x="3" y="5" width="10" height="8" rx="1.5"></rect>
            <rect x="15" y="5" width="6" height="11" rx="1.6"></rect>
            <rect x="5" y="16" width="6" height="3" rx="1"></rect>
          </svg>
          <span>Vue globale</span>
        </button>

        <button class="switcher-button" type="button" data-view="desktop" aria-label="Afficher le desktop" aria-pressed="false">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <rect x="4" y="5" width="16" height="10" rx="1.8"></rect>
            <path d="M9 19h6"></path>
            <path d="M12 15v4"></path>
          </svg>
          <span>Desktop</span>
        </button>

        <button class="switcher-button" type="button" data-view="tablet" aria-label="Afficher la tablette" aria-pressed="false">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <rect x="6" y="3" width="12" height="18" rx="2.8"></rect>
            <path d="M10 18h4"></path>
          </svg>
          <span>Tablette</span>
        </button>

        <button class="switcher-button" type="button" data-view="mobile" aria-label="Afficher le mobile" aria-pressed="false">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <rect x="8" y="2.5" width="8" height="19" rx="2.6"></rect>
            <path d="M11 18.5h2"></path>
          </svg>
          <span>Mobile</span>
        </button>
      </nav>
    </header>

    <main class="preview-stage view-all" id="preview-stage" aria-live="polite">
      <section class="device device-desktop" data-device="desktop" aria-label="Site desktop">
        <div class="device-shell">
          <div class="device-frame">
            <div class="device-screen">
              <iframe
                class="site-viewport"
                data-site-viewport="desktop"
                title="Site client en desktop"
              ></iframe>
            </div>
          </div>
          <div class="desktop-base" aria-hidden="true"></div>
        </div>
      </section>

      <section class="device device-tablet" data-device="tablet" aria-label="Site tablette">
        <div class="device-shell">
          <div class="device-frame">
            <div class="device-screen">
              <iframe
                class="site-viewport"
                data-site-viewport="tablet"
                title="Site client en tablette"
              ></iframe>
            </div>
          </div>
        </div>
      </section>

      <section class="device device-mobile" data-device="mobile" aria-label="Site mobile">
        <div class="device-shell">
          <div class="device-frame">
            <span class="mobile-speaker" aria-hidden="true"></span>
            <div class="device-screen">
              <iframe
                class="site-viewport"
                data-site-viewport="mobile"
                title="Site client en mobile"
              ></iframe>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="assets/script.js"></script>
  </body>
</html>
